version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql-container-ecomtracker
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecomtracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot-app-ecomtracker
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ecomtracker?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: ${JWT_SECRET:-change-me}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  stripe-cli:
    image: stripe/stripe-cli
    container_name: stripe-cli-ecomtracker
    command: "listen --api-key ${STRIPE_API_KEY} --forward-to app:8080/webhook/stripe"
    networks:
      - app-network
    depends_on:
      - app

volumes:
  db_data:

networks:
  app-network:
