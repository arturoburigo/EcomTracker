spring.application.name=EcomTracker

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.error.include-stacktrace=never

api.security.token.secret=${JWT_SECRET}
api.security.token.issuer=API EcomTracker
api.security.token.expiration-hours=2

stripe.api-key=${STRIPE_API_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.currency=brl
stripe.success-url=${STRIPE_SUCCESS_URL:https://arturoburigo.shop/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:https://arturoburigo.shop/cancel}
